<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Girlfriend? ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ff4e8d,#ff8fb8,#ffd6e7);
animation:bg 8s infinite alternate;
}

@keyframes bg{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(30deg);}
}

.card{
width:90%;
max-width:650px;
padding:40px;
border-radius:30px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,.3);
text-align:center;
color:white;
z-index:10;
}

h1{
font-size:40px;
margin-bottom:20px;
}

p{
font-size:22px;
line-height:1.8;
margin-bottom:35px;
}

.buttons{
display:flex;
justify-content:center;
gap:25px;
position:relative;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

#yes{
background:#ff0055;
color:white;
box-shadow:0 0 20px #ff0055;
}

#yes:hover{
transform:scale(1.15);
}

#no{
background:white;
color:#ff0055;
position:relative;
}

footer{
margin-top:30px;
font-size:18px;
opacity:.9;
}

.heart{
position:absolute;
color:#ff004f;
animation:float 7s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(.5);
opacity:1;
}
100%{
transform:translateY(-120vh) scale(2);
opacity:0;
}
}

#success{
display:none;
font-size:38px;
font-weight:bold;
margin-top:30px;
animation:pop 1s infinite alternate;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.08);}
}
</style>
</head>

<body>

<div class="card">

<h1>❤️ Honeyy 🍯🐝 ❤️</h1>

<p>
Life makes so much sense when I'm with you.<br><br>

I choose you today, and every day after this.<br><br>

Forever sounds perfect only because it's with you.<br><br>

<b>Will you be my girlfriend? ❤️</b>
</p>

<div class="buttons">
<button id="yes">YES 💖</button>
<button id="no">NO 🙈</button>
</div>

<div id="success">
💍 YAY!! You Made Me The Happiest Person Alive! ❤️🥹
</div>

<footer>
Created by <b>Vedant</b> ❤️
</footer>

</div>

<script>

function heart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML=["❤️","💖","💕","💗","💘","💝"][Math.floor(Math.random()*6)];
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*50)+"px";
document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},7000);
}

setInterval(heart,250);

document.getElementById("yes").onclick=function(){

document.getElementById("success").style.display="block";

for(let i=0;i<250;i++){

setTimeout(heart,i*15);

}

};

const no=document.getElementById("no");

no.addEventListener("mouseover",function(){

let x=Math.random()*(window.innerWidth-150);

let y=Math.random()*(window.innerHeight-80);

no.style.position="fixed";

no.style.left=x+"px";

no.style.top=y+"px";

});

</script>

</body>
</html>
